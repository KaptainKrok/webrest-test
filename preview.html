<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  body {
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background: transparent;
  }

  #text {
    font-size: 36px;
    font-weight: bold;
    transition: color 1s ease;
  }
</style>
</head>

<body>

<p id="text">Hello!</p>

<script>
const colors = ["red", "blue", "green", "purple", "orange"];
let i = 0;

setInterval(() => {
  i = (i + 1) % colors.length;
  document.getElementById("text").style.color = colors[i];
}, 5000);
</script>

</body>
</html>
